server {
    listen 80;
    server_name platform.mantracare.com;

    # Force redirects to stay on the same protocol (HTTPS)
    absolute_redirect off;
    port_in_redirect off;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "upgrade-insecure-requests; frame-ancestors 'self' https://web.mantracare.com https://app.mantracare.com;" always;

    # 1. Force HTTPS if Load Balancer says it's HTTP
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # 2. Main app location
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Prevent directory redirects by not using $uri/
        try_files $uri /therapy/index.html;
    }

    # 3. Handle /therapy without a slash and without a protocol drop
    location = /therapy {
        return 301 https://$host/therapy/;
    }

    # 4. Root redirect
    location = / {
        return 301 https://$host/therapy/;
    }

    error_page 404 /therapy/index.html;
    error_page 500 502 503 504 /50x.html;
}
