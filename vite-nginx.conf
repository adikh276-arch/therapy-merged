server {
    listen 80;
    
    # Disable automatic redirects that might drop protocol
    absolute_redirect off;
    port_in_redirect off;

    # FORCE HTTPS FOR EVERYTHING
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "upgrade-insecure-requests; frame-ancestors 'self' https://web.mantracare.com https://app.mantracare.com;" always;

    # Handle protocol downgrade from Load Balancer
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Force the trailing slash manually if it's a directory
        if (-d $request_filename) {
            rewrite ^(.*[^/])$ https://$host$1/ permanent;
        }
        try_files $uri $uri/ /therapy/index.html;
    }

    location = / {
        return 301 https://$host/therapy/;
    }

    location = /therapy {
        return 301 https://$host/therapy/;
    }

    error_page 404 /therapy/index.html;
    error_page 500 502 503 504 /50x.html;
}
