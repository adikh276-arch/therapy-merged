server {
    listen 80;
    server_name platform.mantracare.com;

    # Force Nginx to believe it is on HTTPS
    # This prevents the "Protocol Downgrade" during redirects
    absolute_redirect on;
    port_in_redirect off;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "upgrade-insecure-requests; frame-ancestors 'self' https://web.mantracare.com https://app.mantracare.com;" always;

    # 1. Handle protocol headers from Cloudflare
    set $real_scheme $http_x_forwarded_proto;
    if ($real_scheme = "") {
        set $real_scheme "https";
    }

    # 2. Redirect / to /therapy (Stay on HTTPS)
    location = / {
        return 301 https://$host/therapy/;
    }

    # 3. Handle the /therapy path (No-slash to Slash transition)
    # We use a rewrite to ensure the protocol is preserved perfectly
    location = /therapy {
        return 301 https://$host/therapy/;
    }

    # 4. Main application serving
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Try file, then fallback to SPA index
        try_files $uri /therapy/index.html;
    }

    error_page 404 /therapy/index.html;
    error_page 500 502 503 504 /50x.html;
}
