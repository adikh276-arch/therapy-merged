server {
    listen 80;
    
    # Disable automatic redirects that might drop protocol
    absolute_redirect off;
    port_in_redirect off;

    # FORCE HTTPS FOR EVERYTHING
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "upgrade-insecure-requests; frame-ancestors 'self' https://web.mantracare.com https://app.mantracare.com;" always;

    # Handle protocol downgrade from Load Balancer
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Try the file directly, then try it as a directory, then fallback to index.html
        # We REMOVE the $uri/ to prevent the automatic trailing slash redirect
        try_files $uri /therapy/index.html;
    }

    # Specifically handle /therapy without a redirect
    location = /therapy {
        root /usr/share/nginx/html;
        try_files /therapy/index.html =404;
    }

    location = / {
        return 301 https://$host/therapy;
    }

    error_page 404 /therapy/index.html;
    error_page 500 502 503 504 /50x.html;
}
