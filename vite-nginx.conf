server {
    listen 80;
    absolute_redirect off;

    # Force HTTPS if behind a load balancer
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /therapy/index.html;
    }
    error_page 404 /therapy/index.html;
    
    location = / {
        return 301 /therapy/;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
