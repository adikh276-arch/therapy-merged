name: Build & Push therapy:1.0

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_AUTH_PORTAL_URL: ${{ secrets.AUTH_PORTAL_URL }}

      - name: Verify no external links
        run: |
          grep -rn "platform.mantracare.com" src/ && exit 1 || true
          grep -rn "web.mantracare.com/app" src/ && exit 1 || true

      - name: Sanitize Registry URL
        id: prep
        run: |
          REGISTRY=$(echo "${{ secrets.REGISTRY_URL }}" | sed -e 's|^https\?://||' -e 's|/$||')
          echo "registry=${REGISTRY}" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.prep.outputs.registry }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.prep.outputs.registry }}/lovable/therapy:1.0
            ${{ steps.prep.outputs.registry }}/lovable/therapy:latest
          build-args: |
            VITE_AUTH_PORTAL_URL=${{ secrets.AUTH_PORTAL_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
