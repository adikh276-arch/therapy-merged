server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Subpath /therapy
    location /therapy {
        alias /usr/share/nginx/html/therapy;
        try_files $uri $uri/ /therapy/index.html;

        # Disable cache for index.html
        location ~* \.html$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        }
    }

    # Explicitly handle assets to prevent MIME type errors
    location /therapy/assets/ {
        alias /usr/share/nginx/html/therapy/assets/;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public";
    }

    # Redirect root to /therapy
    location = / {
        return 301 /therapy/;
    }

    # Optional: Static content mapping if needed outside /therapy
    location /static/ {
        alias /usr/share/nginx/html/static/;
        try_files $uri =404;
    }

    error_page 404 /therapy/index.html;
}
