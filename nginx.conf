server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Handle the /therapy subpath
    location /therapy {
        alias /usr/share/nginx/html;
        try_files $uri $uri/ /therapy/index.html;

        # Ensure correct MIME types for assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|json)$ {
            access_log off;
            expires 1y;
            add_header Cache-Control "public";
            try_files $uri =404;
        }
    }

    # Redirect root to /therapy for convenience
    location = / {
        return 301 /therapy/;
    }

    # Static HTML content for concern pages (Group C2)
    # The app uses /static/content/... as iframe src
    location /static/content/ {
        alias /usr/share/nginx/html/static/content/;
        try_files $uri $uri/index.html =404;
    }
}
