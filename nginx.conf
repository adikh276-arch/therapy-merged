server {
    listen 80;
    root /usr/share/nginx/html;
    
    # Critical: include mime types for proper script execution
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Handle the /therapy subpath
    location /therapy {
        # Check if the requested file exists, otherwise serve the SPA index
        # We also check $uri without the therapy prefix just in case the proxy strips it
        try_files $uri $uri/ /therapy/index.html;
    }

    # Catch-all for assets if prefix is stripped by a proxy
    location /assets/ {
        root /usr/share/nginx/html/therapy;
        try_files $uri =404;
    }

    # Static content at root (Group C2)
    location /static/content/ {
        try_files $uri $uri/index.html =404;
    }

    # Redirect root to /therapy
    location = / {
        return 301 /therapy/;
    }
    
    # Catch-all fallback to /therapy/index.html just in case
    error_page 404 /therapy/index.html;
}
