server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA — all routes fall through to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static HTML content for concern pages (Group C2)
    location /static/content/ {
        try_files $uri $uri/index.html =404;
    }
}
