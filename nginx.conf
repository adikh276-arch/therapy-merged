server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Handle the /therapy subpath with physical directory mapping
    location /therapy/ {
        try_files $uri $uri/ /therapy/index.html;
    }

    # Helper for assets inside the therapy subpath
    location ~* ^/therapy/assets/.*$ {
        root /usr/share/nginx/html;
        access_log off;
        expires 1y;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Redirect root to /therapy for convenience
    location = / {
        return 301 /therapy/;
    }

    # Static HTML content for concern pages (Group C2)
    location /static/content/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/index.html =404;
    }
}
