server {
    listen 80;
    root /usr/share/nginx/html;
    
    # Critical: include mime types for proper script execution
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Handle the /therapy subpath
    location /therapy/ {
        try_files $uri $uri/ /therapy/index.html;
    }

    # Redirect /therapy (no slash) to /therapy/
    location = /therapy {
        return 301 /therapy/;
    }

    # Stop caching index.html to prevent stale hashes
    location = /therapy/index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Catch-all for assets (return 404 immediately if missing, do not serve index.html)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|json)$ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public";
        # Disable the global error_page fallback for assets
        recursive_error_pages off;
        error_page 404 =404 /404.html;
    }

    # Static content at root (Group C2)
    location /static/content/ {
        try_files $uri $uri/index.html =404;
    }

    # Redirect root to /therapy
    location = / {
        return 301 /therapy/;
    }
    
    # Catch-all fallback for navigation routes only
    error_page 404 /therapy/index.html;
}
